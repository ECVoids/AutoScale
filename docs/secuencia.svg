<svg width="680" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Diagrama de secuencia AutoScale</title>
  <desc>Secuencia completa: arranque y registro, ciclo de polling, evaluación de política y scale-up en AWS EC2.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    text { font-family: system-ui, sans-serif; fill: #2C2C2A; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; fill: #5F5E5A; }
    .sec { font-size: 11px; fill: #888780; }
    .arr-info { stroke: #185FA5; }
    .arr-warn { stroke: #BA7517; }
  </style>

  <!-- Headers -->
  <rect x="30" y="20" width="120" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="90" y="38" text-anchor="middle" fill="#085041">MonitorC</text>
  <text class="ts" x="90" y="56" text-anchor="middle">AppInstance</text>

  <rect x="210" y="20" width="120" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="270" y="42" text-anchor="middle" dominant-baseline="central" fill="#3C3489">MonitorS</text>

  <rect x="390" y="20" width="120" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="450" y="38" text-anchor="middle" fill="#712B13">ControllerASG</text>

  <rect x="570" y="20" width="98" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="th" x="619" y="38" text-anchor="middle" fill="#633806">AWS EC2</text>
  <text class="ts" x="619" y="56" text-anchor="middle">API / SDK</text>

  <!-- Lifelines -->
  <line x1="90"  y1="64" x2="90"  y2="600" stroke="#D3D1C7" stroke-width="0.8" stroke-dasharray="5 4"/>
  <line x1="270" y1="64" x2="270" y2="600" stroke="#D3D1C7" stroke-width="0.8" stroke-dasharray="5 4"/>
  <line x1="450" y1="64" x2="450" y2="600" stroke="#D3D1C7" stroke-width="0.8" stroke-dasharray="5 4"/>
  <line x1="619" y1="64" x2="619" y2="600" stroke="#D3D1C7" stroke-width="0.8" stroke-dasharray="5 4"/>

  <!-- Section 1 -->
  <rect x="30" y="78" width="630" height="20" rx="4" fill="#F1EFE8" opacity="0.8"/>
  <text class="sec" x="40" y="92">1 · Arranque y registro</text>

  <line x1="92" y1="114" x2="266" y2="114" class="arr-info" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text class="ts" x="180" y="110" text-anchor="middle" fill="#185FA5">Register(instance_id, ip, port)</text>
  <line x1="268" y1="130" x2="94" y2="130" stroke="#888780" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts" x="180" y="145" text-anchor="middle">RegisterResponse(monitor_s_id)</text>

  <!-- Section 2 -->
  <rect x="30" y="162" width="630" height="20" rx="4" fill="#F1EFE8" opacity="0.8"/>
  <text class="sec" x="40" y="176">2 · Ciclo de polling (cada POLL_INTERVAL segundos)</text>

  <line x1="272" y1="198" x2="96" y2="198" class="arr-info" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text class="ts" x="180" y="194" text-anchor="middle" fill="#185FA5">Ping()</text>
  <line x1="92" y1="214" x2="268" y2="214" stroke="#888780" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts" x="180" y="228" text-anchor="middle">Pong(alive=true, rtt_ms)</text>

  <line x1="272" y1="244" x2="96" y2="244" class="arr-info" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text class="ts" x="180" y="240" text-anchor="middle" fill="#185FA5">GetMetrics()</text>
  <line x1="92" y1="260" x2="268" y2="260" stroke="#888780" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts" x="180" y="275" text-anchor="middle">MetricsSnapshot(cpu=78%)</text>

  <rect x="240" y="284" width="64" height="24" rx="4" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text class="sec" x="272" y="299" text-anchor="middle">actualiza registry</text>

  <!-- Section 3 -->
  <rect x="30" y="322" width="630" height="20" rx="4" fill="#F1EFE8" opacity="0.8"/>
  <text class="sec" x="40" y="336">3 · Evaluación de política (cada EVAL_INTERVAL segundos)</text>

  <line x1="448" y1="356" x2="274" y2="356" class="arr-warn" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text class="ts" x="362" y="352" text-anchor="middle" fill="#BA7517">snapshot_for_controller()</text>
  <line x1="272" y1="370" x2="446" y2="370" stroke="#888780" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts" x="362" y="385" text-anchor="middle">{avg_cpu=78%, healthy=2, total=2}</text>

  <rect x="392" y="394" width="116" height="24" rx="4" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text class="sec" x="450" y="409" text-anchor="middle">cpu≥70% × 2 rondas → scale_up</text>

  <!-- Section 4 -->
  <rect x="30" y="430" width="630" height="20" rx="4" fill="#F1EFE8" opacity="0.8"/>
  <text class="sec" x="40" y="444">4 · Scale-up</text>

  <line x1="452" y1="464" x2="617" y2="464" class="arr-warn" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text class="ts" x="534" y="460" text-anchor="middle" fill="#BA7517">run_instances(ami, t2.micro)</text>
  <line x1="617" y1="480" x2="454" y2="480" stroke="#888780" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts" x="534" y="495" text-anchor="middle">instance_id = i-0abc123…</text>

  <line x1="92" y1="526" x2="266" y2="526" class="arr-info" stroke-width="1.2" stroke-dasharray="3 2" marker-end="url(#arrow)"/>
  <text class="ts" x="180" y="522" text-anchor="middle" fill="#185FA5">Register() — nueva instancia arranca</text>

  <rect x="210" y="546" width="248" height="24" rx="4" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text class="sec" x="334" y="561" text-anchor="middle">ciclo continúa · cooldown activo 120s</text>
</svg>
