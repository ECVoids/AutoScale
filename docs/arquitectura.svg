<svg width="680" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Arquitectura AutoScale</title>
  <desc>Diagrama estructural: MonitorS, ControllerASG, AppInstances con MonitorC, AWS SDK y protos compartidos.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    text { font-family: system-ui, sans-serif; fill: #2C2C2A; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; fill: #5F5E5A; }
    .lbl-info { fill: #185FA5; }
    .lbl-warn { fill: #854F0B; }
    .lbl-muted { fill: #888780; }
  </style>

  <!-- AWS border -->
  <rect x="20" y="20" width="640" height="520" rx="18" fill="none" stroke="#B4B2A9" stroke-width="1.5" stroke-dasharray="8 5"/>
  <text class="ts" x="44" y="42" style="fill:#B4B2A9;font-size:11px">AWS EC2</text>

  <!-- MonitorS instance container -->
  <rect x="44" y="56" width="260" height="200" rx="14" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="174" y="82" text-anchor="middle" fill="#3C3489">Instancia MonitorS</text>
  <text class="ts" x="174" y="100" text-anchor="middle">EC2 t2.micro</text>

  <!-- MonitorS box -->
  <rect x="60" y="112" width="220" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="170" y="136" text-anchor="middle" dominant-baseline="central" fill="#085041">MonitorS</text>
  <text class="ts" x="170" y="154" text-anchor="middle" dominant-baseline="central">Polling · registro · estado global</text>

  <!-- ControllerASG box -->
  <rect x="60" y="182" width="220" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="170" y="206" text-anchor="middle" dominant-baseline="central" fill="#712B13">ControllerASG</text>
  <text class="ts" x="170" y="224" text-anchor="middle" dominant-baseline="central">Políticas · escala EC2</text>

  <!-- Shared memory arrow -->
  <line x1="170" y1="168" x2="170" y2="182" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="ts" x="180" y="178" style="font-size:10px">mem. compartida</text>

  <!-- AppInstance 1 -->
  <rect x="356" y="56" width="144" height="176" rx="14" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="428" y="80" text-anchor="middle" fill="#0C447C">AppInstance 1</text>
  <text class="ts" x="428" y="97" text-anchor="middle">EC2 t2.micro</text>
  <rect x="370" y="108" width="116" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="428" y="130" text-anchor="middle" dominant-baseline="central" fill="#085041">MonitorC</text>
  <rect x="370" y="164" width="116" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th" x="428" y="182" text-anchor="middle" dominant-baseline="central" fill="#444441">AppInstance</text>
  <text class="ts" x="428" y="199" text-anchor="middle" dominant-baseline="central">app.py + load_gen</text>

  <!-- AppInstance 2 -->
  <rect x="516" y="56" width="144" height="176" rx="14" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="588" y="80" text-anchor="middle" fill="#0C447C">AppInstance 2</text>
  <text class="ts" x="588" y="97" text-anchor="middle">EC2 t2.micro</text>
  <rect x="530" y="108" width="116" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="588" y="130" text-anchor="middle" dominant-baseline="central" fill="#085041">MonitorC</text>
  <rect x="530" y="164" width="116" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th" x="588" y="182" text-anchor="middle" dominant-baseline="central" fill="#444441">AppInstance</text>
  <text class="ts" x="588" y="199" text-anchor="middle" dominant-baseline="central">app.py + load_gen</text>

  <!-- AppInstance N dashed -->
  <rect x="356" y="258" width="304" height="60" rx="12" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="6 4"/>
  <text class="ts" x="508" y="292" text-anchor="middle">AppInstance N  (hasta max=5)</text>

  <!-- AWS SDK -->
  <rect x="44" y="348" width="260" height="56" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="th" x="174" y="372" text-anchor="middle" dominant-baseline="central" fill="#633806">AWS SDK (boto3)</text>
  <text class="ts" x="174" y="390" text-anchor="middle" dominant-baseline="central">EC2 API · run/terminate/describe</text>

  <!-- AMI -->
  <rect x="356" y="348" width="304" height="56" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th" x="508" y="372" text-anchor="middle" dominant-baseline="central" fill="#444441">AMI personalizada</text>
  <text class="ts" x="508" y="390" text-anchor="middle" dominant-baseline="central">Base para nuevas instancias EC2</text>

  <!-- Shared protos -->
  <rect x="44" y="432" width="616" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th" x="352" y="450" text-anchor="middle" dominant-baseline="central" fill="#444441">shared-protos  (monitor.proto)</text>
  <text class="ts" x="352" y="467" text-anchor="middle" dominant-baseline="central">Contratos gRPC compartidos por MonitorS y todos los MonitorC</text>

  <!-- Arrows: gRPC -->
  <line x1="304" y1="134" x2="356" y2="130" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="356" y1="142" x2="304" y2="146" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text class="ts lbl-info" x="329" y="125" text-anchor="middle">gRPC</text>
  <line x1="304" y1="155" x2="530" y2="130" stroke="#185FA5" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

  <!-- ControllerASG → AWS SDK -->
  <line x1="174" y1="238" x2="174" y2="348" stroke="#BA7517" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text class="ts lbl-warn" x="152" y="295">IaC</text>

  <!-- ControllerASG → AppInstance N -->
  <line x1="304" y1="210" x2="354" y2="258" stroke="#BA7517" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts lbl-warn" x="348" y="235">launch/terminate</text>

  <!-- AWS SDK → AMI -->
  <line x1="304" y1="376" x2="354" y2="376" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <line x1="44" y1="500" x2="70" y2="500" stroke="#185FA5" stroke-width="1.5"/>
  <text class="ts" x="75" y="504">gRPC (polling · heartbeat)</text>
  <line x1="240" y1="500" x2="266" y2="500" stroke="#BA7517" stroke-width="1.5"/>
  <text class="ts" x="271" y="504">AWS SDK (IaC)</text>
  <line x1="380" y1="500" x2="406" y2="500" stroke="#888780" stroke-width="1" stroke-dasharray="4 3"/>
  <text class="ts" x="411" y="504">Referencia</text>
</svg>
